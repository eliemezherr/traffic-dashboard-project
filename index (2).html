<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Traffic Congestion Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #111116;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      padding: 32px 28px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes alertSlideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes ripple {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(3); opacity: 0; }
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
    .title { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .badge {
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
      padding: 3px 8px; border-radius: 4px; letter-spacing: 0.06em; display: inline-block; vertical-align: middle; margin-left: 10px;
    }
    .badge.live { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge.paused { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
    .subtitle { font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; }
    .btn-pause {
      font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 16px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #f0f0f0;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-pause:hover { background: rgba(255,255,255,0.1); }
    .stats-strip {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 24px;
      padding: 16px 20px; background: rgba(255,255,255,0.02); border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .stat { text-align: center; }
    .stat-label {
      font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
    }
    .stat-value { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .stat-sub { font-family: 'DM Mono', monospace; font-size: 10px; margin-top: 2px; color: rgba(255,255,255,0.25); }
    .stat-sub.rush { color: #f87171; }
    .stat-sub.alert { color: #fbbf24; }
    .timeline-label {
      font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; margin-top: 20px;
    }
    .timeline { display: flex; gap: 2px; align-items: flex-end; height: 32px; }
    .timeline-bar { flex: 1; border-radius: 3px; transition: height 0.3s ease, background 0.3s ease; position: relative; }
    .timeline-time {
      display: flex; justify-content: space-between; margin-top: 4px;
      font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.2);
    }
    .timeline-current {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      font-family: 'DM Mono', monospace; font-size: 10px; color: #93c5fd; white-space: nowrap;
    }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 28px; }
    .map-container {
      background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid rgba(255,255,255,0.04);
      padding: 20px; position: relative; overflow: hidden; min-height: 420px;
    }
    .map-title {
      font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px;
    }
    .map-svg-wrap { position: relative; width: 100%; height: 370px; }
    .map-zone {
      position: absolute; display: flex; flex-direction: column; align-items: center;
      cursor: default; transition: transform 0.3s ease;
      transform: translate(-50%, -50%);
    }
    .map-zone:hover { transform: translate(-50%, -50%) scale(1.07); }
    .map-zone-circle {
      width: 105px; height: 105px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; flex-direction: column; font-weight: 700; font-size: 13px; position: relative;
      transition: background 0.5s, box-shadow 0.5s, border-color 0.5s;
      border: 2px solid transparent;
    }
    .map-zone-circle.normal {
      background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3);
      box-shadow: 0 0 25px rgba(34,197,94,0.15);
    }
    .map-zone-circle.congested {
      background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.5);
      box-shadow: 0 0 35px rgba(239,68,68,0.3);
    }
    .map-zone-ripple {
      position: absolute; width: 105px; height: 105px; border-radius: 50%;
      border: 2px solid rgba(239,68,68,0.4); animation: ripple 2s infinite;
    }
    .map-zone-name-inner {
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.8); margin-bottom: 2px;
    }
    .map-zone-speed-inner {
      font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 700;
      color: #f0f0f0; line-height: 1;
    }
    .map-zone-speed-unit {
      font-family: 'DM Mono', monospace; font-size: 8px; color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }
    .map-zone-vehicles {
      font-family: 'DM Mono', monospace; font-size: 9px; margin-top: 6px;
    }
    .map-roads-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
    }
    .zones-column { display: flex; flex-direction: column; gap: 12px; }
    .zone-card {
      border-radius: 16px; padding: 18px 22px; display: flex; flex-direction: column; gap: 12px;
      transition: border-color 0.4s, background 0.4s;
    }
    .zone-card.congested {
      background: linear-gradient(135deg, rgba(239,68,68,0.12) 0%, rgba(30,30,36,1) 100%);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .zone-card.normal {
      background: linear-gradient(135deg, rgba(34,197,94,0.08) 0%, rgba(30,30,36,1) 100%);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .zone-header { display: flex; justify-content: space-between; align-items: center; }
    .zone-name { font-weight: 700; font-size: 16px; letter-spacing: -0.02em; }
    .zone-id { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35); margin-left: 18px; }
    .dot {
      display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; vertical-align: middle;
    }
    .dot.red { background: #ef4444; box-shadow: 0 0 8px 2px rgba(239,68,68,0.5); animation: pulse 1.2s infinite; }
    .dot.green { background: #22c55e; box-shadow: 0 0 8px 2px rgba(34,197,94,0.4); }
    .prediction-badge {
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600;
      padding: 3px 8px; border-radius: 6px; letter-spacing: 0.05em;
    }
    .prediction-badge.congested { background: rgba(239,68,68,0.15); color: #f87171; }
    .prediction-badge.normal { background: rgba(34,197,94,0.12); color: #4ade80; }
    .zone-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .metric-label {
      font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px;
    }
    .metric-value { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .metric-unit { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.35); margin-left: 2px; }
    .metric-value.danger { color: #f87171; }
    .metric-value.warn { color: #fbbf24; }
    .metric-value.ok { color: #4ade80; }
    .load-bar { width: 100%; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.07); overflow: hidden; }
    .load-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .alerts-panel {
      background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid rgba(255,255,255,0.04);
      padding: 20px; max-height: 300px; overflow-y: auto;
    }
    .alerts-panel::-webkit-scrollbar { width: 4px; }
    .alerts-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .alert-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 8px;
      margin-bottom: 6px; animation: alertSlideIn 0.4s ease;
    }
    .alert-item.congestion { background: rgba(239,68,68,0.06); border-left: 3px solid #ef4444; }
    .alert-item.cleared { background: rgba(34,197,94,0.06); border-left: 3px solid #22c55e; }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-text { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.4; }
    .alert-time { font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 2px; }
    .alert-empty { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; padding: 40px 0; }
    .history-panel {
      background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid rgba(255,255,255,0.04);
      padding: 20px; max-height: 300px; overflow-y: auto;
    }
    .history-panel::-webkit-scrollbar { width: 4px; }
    .history-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th {
      font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 8px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; background: #18181d;
    }
    .history-table td {
      font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 8px; color: rgba(255,255,255,0.6);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .history-table tr:hover td { background: rgba(255,255,255,0.02); }
    .status-dot-small {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle;
    }
    .charts-section {
      margin-top: 20px; padding: 20px 24px; background: rgba(255,255,255,0.02);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.04);
    }
    .charts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 16px; }
    .chart-zone-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
    .footer {
      margin-top: 24px; text-align: center; font-family: 'DM Mono', monospace;
      font-size: 10px; color: rgba(255,255,255,0.15);
    }
    @media (max-width: 800px) {
      .main-grid { grid-template-columns: 1fr; }
      .bottom-grid { grid-template-columns: 1fr; }
      .charts-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-strip { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const ZONES = [
  { id: "ZoneA", name: "Kfarshima", capacity: 60, mapX: 25, mapY: 75 },
  { id: "ZoneB", name: "Bseba", capacity: 80, mapX: 75, mapY: 25 },
  { id: "ZoneC", name: "Baabda", capacity: 50, mapX: 75, mapY: 75 },
  { id: "ZoneD", name: "Hadath", capacity: 70, mapX: 25, mapY: 25 },
];
const RUSH_HOURS = [7, 8, 9, 17, 18, 19];

let simulatedHour = 0, totalMessages = 0, isRunning = true, tick = 0;
const speedHistory = {}, alerts = [], historyLog = [];
let prevCongestionState = {};
ZONES.forEach(z => { speedHistory[z.id] = []; prevCongestionState[z.id] = false; });

function generateZoneData(hour) {
  const isRush = RUSH_HOURS.includes(hour);
  return ZONES.map(zone => {
    let vehicleCount, avgSpeed, isCongested;
    if (isRush) {
      vehicleCount = Math.round(zone.capacity * (0.55 + Math.random() * 0.45));
      const ratio = vehicleCount / zone.capacity;
      if (ratio > 0.75 && Math.random() > 0.25) {
        avgSpeed = Math.round(5 + Math.random() * 23);
        isCongested = true;
      } else {
        avgSpeed = Math.round(35 + Math.random() * 40);
        isCongested = false;
      }
    } else {
      vehicleCount = Math.round(zone.capacity * (0.1 + Math.random() * 0.4));
      avgSpeed = Math.round(50 + Math.random() * 65);
      isCongested = false;
    }
    return { ...zone, vehicleCount, avgSpeed, isCongested, congestionRatio: Math.round((vehicleCount / zone.capacity) * 100), prediction: isCongested ? "CONGESTED" : "NORMAL" };
  });
}

function updateAlerts(zoneData) {
  const h = String(simulatedHour).padStart(2, "0") + ":00";
  zoneData.forEach(z => {
    if (z.isCongested && !prevCongestionState[z.id])
      alerts.unshift({ type: "congestion", time: h, msg: `${z.name} congestion detected — Speed: ${z.avgSpeed} km/h, Load: ${z.congestionRatio}%` });
    else if (!z.isCongested && prevCongestionState[z.id])
      alerts.unshift({ type: "cleared", time: h, msg: `${z.name} congestion cleared — Speed recovered to ${z.avgSpeed} km/h` });
    prevCongestionState[z.id] = z.isCongested;
  });
  if (alerts.length > 20) alerts.length = 20;
}

function updateHistory(zoneData) {
  const h = String(simulatedHour).padStart(2, "0") + ":00";
  zoneData.forEach(z => {
    historyLog.unshift({ time: h, zone: z.name, speed: z.avgSpeed, vehicles: z.vehicleCount, load: z.congestionRatio, status: z.isCongested });
  });
  if (historyLog.length > 60) historyLog.length = 60;
}

function renderChart(history, id) {
  const el = document.getElementById(id);
  if (!el || history.length < 2) { if (el) el.innerHTML = ''; return; }
  const max = 120, w = 200, h = 50;
  const last = history[history.length - 1];
  const c = last < 30 ? "#ef4444" : last < 60 ? "#eab308" : "#22c55e";
  const pts = history.map((v, i) => `${(i/(history.length-1))*w},${h-(v/max)*h}`);
  el.innerHTML = `<svg width="${w}" height="${h}" style="overflow:visible">
    <defs><linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c}" stop-opacity="0.2"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="0,${h} ${pts.join(" ")} ${w},${h}" fill="url(#g${id})"/>
    <polyline points="${pts.join(" ")}" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function render(zoneData) {
  const cc = zoneData.filter(z => z.isCongested).length;
  const isRN = RUSH_HOURS.includes(simulatedHour);
  const hStr = String(simulatedHour).padStart(2, "0") + ":00";

  let h = `<div class="header-row"><div>
    <div><span class="title">Traffic Congestion</span><span class="badge ${isRunning?'live':'paused'}">${isRunning?'LIVE':'PAUSED'}</span></div>
    <div class="subtitle">Smart Prediction Dashboard — Mont-Liban Region</div>
  </div><button class="btn-pause" id="toggleBtn">${isRunning?'⏸ Pause':'▶ Resume'}</button></div>

  <div class="stats-strip">
    <div class="stat"><div class="stat-label">Simulated Time</div><div class="stat-value">${hStr}</div><div class="stat-sub ${isRN?'rush':''}">${isRN?'RUSH HOUR':'Normal'}</div></div>
    <div class="stat"><div class="stat-label">Zones Congested</div><div class="stat-value">${cc} / ${ZONES.length}</div><div class="stat-sub ${cc>0?'alert':''}">${cc>0?'Alert Active':'All Clear'}</div></div>
    <div class="stat"><div class="stat-label">Messages Sent</div><div class="stat-value">${totalMessages.toLocaleString()}</div><div class="stat-sub">From IoT Hub</div></div>
    <div class="stat"><div class="stat-label">Alerts Triggered</div><div class="stat-value">${alerts.filter(a=>a.type==='congestion').length}</div><div class="stat-sub">Congestion Events</div></div>
  </div>

  <div class="timeline-label">24h Cycle — Red = Rush Hours</div><div class="timeline">`;
  for (let i=0;i<24;i++){const isR=RUSH_HOURS.includes(i),isC=i===simulatedHour,ht=isC?28:isR?18:10,bg=isC?"#3b82f6":isR?"rgba(239,68,68,0.35)":"rgba(255,255,255,0.06)";h+=`<div class="timeline-bar" style="height:${ht}px;background:${bg}">${isC?`<div class="timeline-current">${i}:00</div>`:''}</div>`;}
  h+=`</div><div class="timeline-time"><span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>23:00</span></div>`;

  // Map + Cards
  h+=`<div class="main-grid"><div class="map-container"><div class="map-title">Zone Map — Mont-Liban</div><div class="map-svg-wrap">`;
  // SVG roads connecting zone centers
  h+=`<svg class="map-roads-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
    <line x1="25" y1="25" x2="75" y2="25" stroke="rgba(255,255,255,0.07)" stroke-width="0.6"/>
    <line x1="75" y1="25" x2="75" y2="75" stroke="rgba(255,255,255,0.07)" stroke-width="0.6"/>
    <line x1="75" y1="75" x2="25" y2="75" stroke="rgba(255,255,255,0.07)" stroke-width="0.6"/>
    <line x1="25" y1="75" x2="25" y2="25" stroke="rgba(255,255,255,0.07)" stroke-width="0.6"/>
    <line x1="25" y1="25" x2="75" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="0.4" stroke-dasharray="1.5,1.5"/>
    <line x1="75" y1="25" x2="25" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="0.4" stroke-dasharray="1.5,1.5"/>
  </svg>`;
  zoneData.forEach(z=>{const cls=z.isCongested?"congested":"normal";h+=`<div class="map-zone" style="left:${z.mapX}%;top:${z.mapY}%"><div class="map-zone-circle ${cls}">${z.isCongested?'<div class="map-zone-ripple"></div>':''}<div class="map-zone-name-inner">${z.name}</div><div class="map-zone-speed-inner">${z.avgSpeed}</div><div class="map-zone-speed-unit">km/h</div></div><div class="map-zone-vehicles" style="color:${z.isCongested?'#f87171':'#4ade80'}">${z.vehicleCount}/${z.capacity} vehicles</div></div>`;});
  h+=`</div></div><div class="zones-column">`;

  zoneData.forEach(z=>{const sC=z.avgSpeed<30?'danger':'',lC=z.congestionRatio>75?'danger':z.congestionRatio>50?'warn':'ok',lCol=z.congestionRatio>75?'#ef4444':z.congestionRatio>50?'#eab308':'#22c55e';
  h+=`<div class="zone-card ${z.isCongested?'congested':'normal'}"><div class="zone-header"><div><div><span class="dot ${z.isCongested?'red':'green'}"></span><span class="zone-name">${z.name}</span></div><div class="zone-id">${z.id}</div></div><div class="prediction-badge ${z.isCongested?'congested':'normal'}">${z.prediction}</div></div>
  <div class="zone-metrics"><div><div class="metric-label">Avg Speed</div><div class="metric-value ${sC}">${z.avgSpeed}<span class="metric-unit">km/h</span></div></div><div><div class="metric-label">Vehicles</div><div class="metric-value">${z.vehicleCount}<span class="metric-unit">/ ${z.capacity}</span></div></div><div><div class="metric-label">Load</div><div class="metric-value ${lC}">${z.congestionRatio}%</div></div></div>
  <div class="load-bar"><div class="load-fill" style="width:${Math.min(z.congestionRatio,100)}%;background:${lCol}"></div></div></div>`;});
  h+=`</div></div>`;

  // Alerts + History
  h+=`<div class="bottom-grid"><div class="alerts-panel"><div class="stat-label" style="margin-bottom:12px">Live Alerts</div>`;
  if(!alerts.length) h+=`<div class="alert-empty">No alerts yet — waiting for congestion events</div>`;
  else alerts.forEach(a=>{h+=`<div class="alert-item ${a.type}"><div class="alert-icon">${a.type==='congestion'?'🔴':'🟢'}</div><div><div class="alert-text">${a.msg}</div><div class="alert-time">${a.time}</div></div></div>`;});
  h+=`</div><div class="history-panel"><div class="stat-label" style="margin-bottom:12px">Telemetry History</div><table class="history-table"><thead><tr><th>Time</th><th>Zone</th><th>Speed</th><th>Vehicles</th><th>Load</th><th>Status</th></tr></thead><tbody>`;
  historyLog.slice(0,40).forEach(r=>{const dc=r.status?'#ef4444':'#22c55e',st=r.status?'Congested':'Normal';h+=`<tr><td>${r.time}</td><td>${r.zone}</td><td>${r.speed} km/h</td><td>${r.vehicles}</td><td>${r.load}%</td><td><span class="status-dot-small" style="background:${dc}"></span>${st}</td></tr>`;});
  h+=`</tbody></table></div></div>`;

  // Charts
  h+=`<div class="charts-section"><div class="stat-label">Average Speed Trend (last 30 ticks)</div><div class="charts-grid">`;
  ZONES.forEach(z=>{h+=`<div><div class="chart-zone-name">${z.name}</div><div id="ch-${z.id}"></div></div>`;});
  h+=`</div></div><div class="footer">Smart Traffic Congestion Prediction System — Azure IoT Hub → Data Lake Gen2 → Azure ML AutoML</div>`;

  document.getElementById("app").innerHTML=h;
  ZONES.forEach(z=>renderChart(speedHistory[z.id],`ch-${z.id}`));
  document.getElementById("toggleBtn").addEventListener("click",()=>{isRunning=!isRunning;if(isRunning)startLoop();});
}

let intId;
function startLoop(){clearInterval(intId);intId=setInterval(()=>{if(!isRunning){clearInterval(intId);render(generateZoneData(simulatedHour));return;}tick++;simulatedHour=tick%24;totalMessages+=30;const d=generateZoneData(simulatedHour);d.forEach(z=>{speedHistory[z.id].push(z.avgSpeed);if(speedHistory[z.id].length>30)speedHistory[z.id].shift();});updateAlerts(d);updateHistory(d);render(d);},2500);}
render(generateZoneData(0));startLoop();
</script>
